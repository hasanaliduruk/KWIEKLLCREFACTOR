name: Cross-Platform Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Linux & macOS)
      if: runner.os != 'Windows'
      run: pyinstaller --noconfirm --onedir --windowed --add-data "assets:assets" main.py

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: pyinstaller --noconfirm --onedir --windowed --add-data "assets;assets" --collect-all tkinterdnd2 main.py

    - name: Archive Build (Zip)
      uses: thedoctor0/zip-release@0.7.5
      with:
        type: 'zip'
        filename: 'KwiekLLC-${{ runner.os }}.zip'
        directory: 'dist/main'

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: dist/main/KwiekLLC-${{ runner.os }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
